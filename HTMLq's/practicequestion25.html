<!-- Recreate the following form using HTML: -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recreate the foll...</title>
</head>
<body>
    <form action="server/">
        <h2>Feedback Form</h2>
        <label for="Name">Name:</label>
        <input type="text" placeholder="Write your name" id="Name">
        <br>
        <br>
        <label for="E-mail">E-mail:</label>
        <input type="text" placeholder="Write your email" id="E-mail">
        <br>
        <br>
        <label for="Message">Message:</label>
        <br>
        <textarea name="Message" id="Message" rows="5" cols="35"></textarea>
        <br>
        <br>
        <label>Rate us our of 5:</label>
        <br>
        <input type="radio" name="rating" value="1" id="1">
        <label for="1">1</label>
        <br>
        <input type="radio" name="rating" value="2" id="2">
        <label for="2">2</label>
        <br>
        <input type="radio" name="rating" value="3" id="3">
        <label for="3">3</label>
        <br>
        <input type="radio" name="rating" value="4" id="4">
        <label for="4">4</label>
        <br>
        <input type="radio" name="rating" value="5" id="5">
        <label for="5">5</label>
        <br>
        <button>Send your message !</button>
    </form>
</body>
</html>
