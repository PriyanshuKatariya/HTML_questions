<!-- Create a search option that redirect its search request to google. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search on google</title>
</head>
<body>
    <form action="https://www.google.com/search">
        <input type="text" placeholder="Search on Google" name="q"/>
        <button>Search &#128269;</button>
    </form>
</body>
</html>
