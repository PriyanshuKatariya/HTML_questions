<!-- Checkbox - Input Element -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <form action="/server">
    <h2>Choose subjects for CUET Exam</h2>
        <label for="Physics">Physics</label>
        <input type="checkbox" name="subject" id="Physics" value="Physics">
        <br>
        <label for="Chemistry">Chemistry</label>
        <input type="checkbox" name="subject" id="Chemistry" value="Chemistry">
        <br>
        <label for="Maths">Maths</label>
        <input type="checkbox" name="subject" id="Maths" value="Maths">
        <br>
        <label for="Biology">Biology</label>
        <input type="checkbox" name="subject" id="Biology" value="Biology">
        <br>
        <label for="Accountancy">Accountancy</label>
        <input type="checkbox" name="subject" id="Accountancy" value="Accountancy">
        <br>
        <label for="Economics">Economics</label>
        <input type="checkbox" name="subject" id="Economics" value="Economics">
        <br>
        <label for="Business Studies">Business Studies</label>
        <input type="checkbox" name="subject" id="Business Studies" value="Business Studies">
        <br>
        <label for="History">History</label>
        <input type="checkbox" name="subject" id="History" value="History">
        <br>
        <label for="Civics">Civics</label>
        <input type="checkbox" name="subject" id="Civics" value="Civics">
        <br>
        <label for="Geography">Geography</label>
        <input type="checkbox" name="subject" id="Geography" value="Geography">
        <br>
        <label for="English">English</label>
        <input type="checkbox" name="subject" id="English" value="English" checked>
        <br>
        <label for="General Test">General Test</label>
        <input type="checkbox" name="subject" id="General Test" value="General Test" checked>
    <br>
    <br>
    <button>Submit</button>
    </form>
</body>
</html>
