<!-- Select - Input Element(Dropdown) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown</title>
</head>
<body>
    <form action="/server">
        Select Your Course :-
        <select name="Course" id="Course">
        <option>Choose Course..</option>
        <option value="BCA" title="Bachelor of Computer Application">BCA</option>
        <option value="B.Tech" title="Bachelor of Technology">B.Tech</option>
        <option value="BBA" title="Bachelor of Business Administration">BBA</option>
        <option value="B.Com" title="Bachelor of Commerce">B.Com</option>
        <option value="LLB" title="Bachelors of Laws">LLB</option>
        <option value="B.Pharma" title="Bachelor of Pharmacy">B.Pharma</option>
        <option value="MBBS" title="Bachelor of Medicine, Bachelor of Surgery">MBBS</option>
        <option value="B.Ed" title="Bachelor of Education">B.Ed</option> 
        <option value="BA" title="Bachelors of Arts">BA</option>
        <option value="B.Sc" title="Bachelors of Science">B.Sc</option>
        </select>
        <button>Submit</button>
    </form> 
</body>
</html>
