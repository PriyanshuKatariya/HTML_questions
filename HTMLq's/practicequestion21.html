<!-- Range-Input Element -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range-Input Element</title>
</head>
<body>
    <label for="briteness">Select Briteness level :-</label>
    <form action="/server">
        <input type="range" id="briteness" min="0" max="100" name="briteness" step="5" value="70">
        <button>Submit</button>
    </form>
</body>
</html>
