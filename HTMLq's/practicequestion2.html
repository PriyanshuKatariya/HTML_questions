<!-- Using Ordered & Unordered lists -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li><h1>Peacock</h1></li>
        <li><b>Rabbit</b></li>
        <li>Camel</li>
        <li>Lion</li>
        <li>Bear</li>
    </ul>
    <ol type="I">
        <li>Peacock</li>
        <li>Rabbit</li>
        <li>Camel</li>
        <li>Lion</li>
        <li>Bear</li>
    </ol>

</body>
</html>
